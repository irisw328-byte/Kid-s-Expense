<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J's Expenses Tracker</title>
    <style>
        :root {
            --primary: #ff8fa3; 
            --secondary: #4ea8de; 
            --boy2-color: #ffd166;
            --both-color: #b5838d;
            --bg: #F8F9FA;
            --text-main: #2b2d42;
            --success: #2a9d8f;
        }
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            color: var(--text-main);
        }
        .app-container {
            width: 100%;
            max-width: 450px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            padding: 20px;
            box-sizing: border-box;
        }
        
        h2 { text-align: center; margin-top: 0; margin-bottom: 20px; font-size: 24px; color: #333; }

        .form-group { margin-bottom: 18px; }
        .label-wrap { margin-bottom: 8px; font-weight: bold; font-size: 16px; }
        
        input[type="text"], input[type="number"], input[type="password"], input[type="date"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
        }
        input::placeholder { color: #aaa; }
        
        /* Radio Buttons for Categories */
        .radio-group {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            align-items: center;
        }
        .radio-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 15px;
            color: #444;
        }
        input[type="radio"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: var(--text-main);
            margin: 0;
        }

        .btn-group { display: flex; gap: 8px; }
        .btn {
            flex: 1;
            padding: 12px 5px;
            border: 2px solid transparent;
            border-radius: 12px;
            background-color: #f4f6f8;
            cursor: pointer;
            text-align: center;
            font-size: 15px;
            font-weight: bold;
            color: #555;
            transition: 0.2s;
        }

        .btn.active { border-color: transparent; color: white; }
        .btn.active.jayden { background-color: var(--secondary); }
        .btn.active.jamie { background-color: var(--boy2-color); color: #333; }
        .btn.active.both { background-color: var(--both-color); }
        .btn.active.mom { background-color: var(--primary); }
        .btn.active.pocket { background-color: #06d6a0; }

        .btn-submit {
            background-color: var(--text-main);
            color: white;
            width: 100%;
            margin-top: 5px;
            padding: 14px;
            font-size: 18px;
        }

        /* Summary & Filter Area */
        .summary-card {
            background-color: #f8f9fc;
            border-radius: 15px;
            padding: 15px;
            margin-top: 25px;
            border: 1px solid #eee;
        }
        
        .filter-box {
            background-color: white;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 15px;
            border: 1px solid #e0e0e0;
        }
        .filter-row {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-bottom: 10px;
        }
        .filter-row input { padding: 8px; font-size: 14px; }
        .btn-filter {
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-weight: bold;
            cursor: pointer;
            flex: 1;
        }

        .summary-title { text-align: center; font-size: 18px; font-weight: bold; margin-bottom: 15px; }
        
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            text-align: center;
        }
        .summary-table th { padding-bottom: 10px; border-bottom: 2px solid #ddd; font-size: 14px; }
        .summary-table td { padding: 12px 2px; border-bottom: 1px solid #eee; font-size: 15px; font-weight: bold; }
        .td-label { text-align: left; font-size: 14px; font-weight: normal; }
        
        .action-wrap { display: flex; justify-content: center; margin-top: 20px; }
        .btn-export {
            background-color: white;
            border: 1.5px solid var(--success);
            border-radius: 10px;
            padding: 10px 16px;
            cursor: pointer;
            width: 100%;
            color: var(--success);
            font-size: 15px;
            font-weight: bold;
        }

        .history-list { margin-top: 25px; }
        .history-title { font-weight: bold; font-size: 16px; margin-bottom: 10px; }
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px dashed #ddd;
        }
        .history-left { display: flex; align-items: center; gap: 8px; }
        .btn-delete { background: none; border: none; color: #ff4d4f; font-size: 20px; cursor: pointer; padding: 0 5px; }
        .history-desc { font-size: 14px; color: #333; }
        .history-price { font-size: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>💰 J's Expenses Tracker</h2>
    
    <div class="form-group">
        <div class="label-wrap">👦 Who is it for?</div>
        <div class="btn-group" id="whoGroup">
            <button class="btn jayden active" onclick="selectBtn('whoGroup', this, 'Jayden')">Jayden</button>
            <button class="btn jamie" onclick="selectBtn('whoGroup', this, 'Jamie')">Jamie</button>
            <button class="btn both" onclick="selectBtn('whoGroup', this, 'Both')">Both</button>
        </div>
    </div>

    <div class="form-group">
        <div class="label-wrap">🛒 What did we buy?</div>
        <!-- 新增的圓圈預設選項 -->
        <div class="radio-group">
            <label class="radio-label">
                <input type="radio" name="category" value="Toys" checked> Toys ⭕️
            </label>
            <label class="radio-label">
                <input type="radio" name="category" value="Snacks"> Snacks ⭕️
            </label>
            <label class="radio-label">
                <input type="radio" name="category" value="Others"> Others ⭕️
            </label>
        </div>
        <input type="text" id="itemName" placeholder="Details (Optional, e.g., Pokémon)">
    </div>

    <div class="form-group">
        <div class="label-wrap">💵 How much?</div>
        <input type="number" id="itemPrice" placeholder="$ Amount">
    </div>

    <div class="form-group">
        <div class="label-wrap">💳 Who pays?</div>
        <div class="btn-group" id="fundGroup">
            <button class="btn mom active" onclick="selectBtn('fundGroup', this, 'Mom')">Mom's Treat</button>
            <button class="btn pocket" onclick="selectBtn('fundGroup', this, 'Allowance')">Allowance</button>
        </div>
    </div>

    <div class="form-group">
        <div class="label-wrap">🔒 PIN Code</div>
        <input type="password" id="pinCode" placeholder="Enter PIN to add record">
    </div>

    <button class="btn btn-submit" onclick="addExpense()">Add Record</button>

    <div class="summary-card">
        <div class="summary-title">📊 Summary (<span id="summaryPeriod">This Month</span>)</div>
        
        <!-- 新增的日期篩選區塊 -->
        <div class="filter-box">
            <div style="font-size: 14px; font-weight: bold; margin-bottom: 8px;">📅 Filter by Date:</div>
            <div class="filter-row">
                <input type="date" id="startDate">
                <span>to</span>
                <input type="date" id="endDate">
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn-filter" style="background-color: var(--secondary); color: white;" onclick="applyFilter()">Search</button>
                <button class="btn-filter" style="background-color: #eee; color: #333;" onclick="resetFilter()">This Month</button>
            </div>
        </div>

        <table class="summary-table">
            <thead>
                <tr>
                    <th class="td-label">Source</th>
                    <th>Jayden</th>
                    <th>Jamie</th>
                    <th>Both</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td class="td-label">Mom's Treat</td>
                    <td id="mom-jayden">$0</td>
                    <td id="mom-jamie">$0</td>
                    <td id="mom-both">$0</td>
                </tr>
                <tr>
                    <td class="td-label">Allowance</td>
                    <td id="pocket-jayden">$0</td>
                    <td id="pocket-jamie">$0</td>
                    <td id="pocket-both">$0</td>
                </tr>
                <tr style="background-color:#e2e8f0; border-radius: 8px;">
                    <td class="td-label" style="padding-left:5px; font-weight:bold;">Total</td>
                    <td id="total-jayden" style="color: #d90429;">$0</td>
                    <td id="total-jamie" style="color: #d90429;">$0</td>
                    <td id="total-both" style="color: #d90429;">$0</td>
                </tr>
            </tbody>
        </table>
        
        <div class="action-wrap">
            <button class="btn-export" onclick="exportToExcel()">🟢 Export Filtered Records (CSV)</button>
        </div>
    </div>

    <div class="history-list">
        <div class="history-title">📝 Displaying Records</div>
        <div id="historyList"></div>
    </div>
</div>

<script>
    let selectedWho = 'Jayden';
    let selectedFund = 'Mom';
    const CORRECT_PIN = '8855'; 
    let expenses = JSON.parse(localStorage.getItem('JsExpensesTracker')) || [];
    
    // 控制目前是看「這個月」還是「自訂日期」
    let filterMode = 'month'; 
    let currentFilteredExpenses = [];

    const today = new Date();

    function selectBtn(groupId, btnElement, value) {
        const group = document.getElementById(groupId);
        const buttons = group.getElementsByTagName('button');
        for(let btn of buttons) {
            btn.classList.remove('active');
        }
        btnElement.classList.add('active');
        
        if(groupId === 'whoGroup') selectedWho = value;
        if(groupId === 'fundGroup') selectedFund = value;
    }

    function addExpense() {
        const category = document.querySelector('input[name="category"]:checked').value;
        const details = document.getElementById('itemName').value.trim();
        const price = parseFloat(document.getElementById('itemPrice').value);
        const pin = document.getElementById('pinCode').value;

        if(isNaN(price)) {
            alert("Oops! Please enter the amount.");
            return;
        }

        if(pin !== CORRECT_PIN) {
            alert("Incorrect PIN! You cannot add records.");
            return;
        }

        // 組合項目名稱：如果只有選圓圈就顯示分類，有打字就顯示 "分類 (細節)"
        const finalItemName = details ? `${category} (${details})` : category;

        const newRecord = {
            id: Date.now(),
            date: new Date().toISOString(),
            who: selectedWho,
            name: finalItemName,
            price: price,
            fund: selectedFund
        };

        expenses.push(newRecord);
        localStorage.setItem('JsExpensesTracker', JSON.stringify(expenses));
        
        document.getElementById('itemName').value = '';
        document.getElementById('itemPrice').value = '';
        document.getElementById('pinCode').value = ''; 
        
        updateUI();
    }

    function deleteRecord(id) {
        const pin = prompt("Please enter PIN to delete this record:");
        if(pin === CORRECT_PIN) {
            expenses = expenses.filter(record => record.id !== id);
            localStorage.setItem('JsExpensesTracker', JSON.stringify(expenses));
            updateUI();
        } else if (pin !== null) {
            alert("Incorrect PIN!");
        }
    }

    function applyFilter() {
        const sDate = document.getElementById('startDate').value;
        const eDate = document.getElementById('endDate').value;
        if(!sDate || !eDate) {
            alert("Please select both start and end dates.");
            return;
        }
        filterMode = 'custom';
        updateUI();
    }

    function resetFilter() {
        filterMode = 'month';
        document.getElementById('startDate').value = '';
        document.getElementById('endDate').value = '';
        updateUI();
    }

    function exportToExcel() {
        if (currentFilteredExpenses.length === 0) {
            alert("No records to export in this range!");
            return;
        }
        
        let csvContent = "\ufeff"; 
        csvContent += "Date,Who,Item,Amount,Paid By\n";
        
        currentFilteredExpenses.forEach(record => {
            let rDate = new Date(record.date);
            let dateStr = `${rDate.getFullYear()}-${(rDate.getMonth()+1).toString().padStart(2, '0')}-${rDate.getDate().toString().padStart(2, '0')}`;
            let cleanName = record.name.replace(/,/g, " ");
            
            csvContent += `${dateStr},${record.who},${cleanName},${record.price},${record.fund}\n`;
        });
        
        const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        
        const fileDate = `${today.getFullYear()}_${(today.getMonth()+1).toString().padStart(2, '0')}`;
        link.setAttribute("download", `Js_Expenses_${fileDate}.csv`);
        link.style.visibility = 'hidden';
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    function updateUI() {
        let stats = {
            'Jayden': { 'Mom': 0, 'Allowance': 0 },
            'Jamie': { 'Mom': 0, 'Allowance': 0 },
            'Both': { 'Mom': 0, 'Allowance': 0 }
        };

        // 依據篩選條件過濾資料
        if (filterMode === 'month') {
            const currentMonth = today.getMonth();
            const currentYear = today.getFullYear();
            currentFilteredExpenses = expenses.filter(r => {
                let d = new Date(r.date);
                return d.getMonth() === currentMonth && d.getFullYear() === currentYear;
            });
            document.getElementById('summaryPeriod').innerText = "This Month";
        } else {
            const sDate = new Date(document.getElementById('startDate').value);
            sDate.setHours(0,0,0,0);
            const eDate = new Date(document.getElementById('endDate').value);
            eDate.setHours(23,59,59,999);
            
            currentFilteredExpenses = expenses.filter(r => {
                let d = new Date(r.date);
                return d >= sDate && d <= eDate;
            });
            document.getElementById('summaryPeriod').innerText = "Custom Range";
        }

        let historyHTML = '';
        let count = 0;

        // 計算報表數字 & 產生歷史紀錄 (顯示篩選範圍內的最新5筆)
        // 先將過濾後的資料依日期反向排序 (最新的在上面)
        let sortedExpenses = [...currentFilteredExpenses].sort((a,b) => new Date(b.date) - new Date(a.date));

        sortedExpenses.forEach(record => {
            stats[record.who][record.fund] += record.price;

            if(count < 5) {
                let rDate = new Date(record.date);
                let dateStr = (rDate.getMonth()+1) + '/' + rDate.getDate();
                let fundIcon = record.fund === 'Mom' ? '👩' : '👛';
                
                historyHTML += `
                    <div class="history-item">
                        <div class="history-left">
                            <button class="btn-delete" onclick="deleteRecord(${record.id})">×</button>
                            <div class="history-desc">
                                ${dateStr} | <b>${record.who}</b> - ${record.name}
                            </div>
                        </div>
                        <div class="history-price">${fundIcon} $${record.price}</div>
                    </div>
                `;
                count++;
            }
        });

        document.getElementById('mom-jayden').innerText = '$' + stats['Jayden']['Mom'];
        document.getElementById('mom-jamie').innerText = '$' + stats['Jamie']['Mom'];
        document.getElementById('mom-both').innerText = '$' + stats['Both']['Mom'];
        
        document.getElementById('pocket-jayden').innerText = '$' + stats['Jayden']['Allowance'];
        document.getElementById('pocket-jamie').innerText = '$' + stats['Jamie']['Allowance'];
        document.getElementById('pocket-both').innerText = '$' + stats['Both']['Allowance'];
        
        document.getElementById('total-jayden').innerText = '$' + (stats['Jayden']['Mom'] + stats['Jayden']['Allowance']);
        document.getElementById('total-jamie').innerText = '$' + (stats['Jamie']['Mom'] + stats['Jamie']['Allowance']);
        document.getElementById('total-both').innerText = '$' + (stats['Both']['Mom'] + stats['Both']['Allowance']);

        if(historyHTML === '') historyHTML = '<div style="color:#999; text-align:center; padding: 10px;">No records found.</div>';
        document.getElementById('historyList').innerHTML = historyHTML;
    }

    updateUI();
</script>

</body>
</html>
